name: Verify (Windows)

# Runs install.ps1 end-to-end on a Windows runner and asserts that zvk + zig
# produce the expected exit codes. Auto-triggers after each release so a bad
# release surfaces quickly; can also be run manually via workflow_dispatch.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "ZVK_VERSION to install (default: latest)"
        required: false
        default: "latest"

jobs:
  install-and-verify:
    runs-on: windows-latest
    steps:
      - name: Run install.ps1
        shell: pwsh
        env:
          ZVK_VERSION: ${{ github.event.inputs.version || 'latest' }}
        run: |
          $ErrorActionPreference = 'Stop'
          irm https://raw.githubusercontent.com/zoptia/zig-version-kit/main/install.ps1 | iex

      - name: zvk version + status
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:USERPROFILE '.zoptia\zig\bin'
          $env:PATH = "$bin;$env:PATH"
          & zvk version
          if ($LASTEXITCODE -ne 0) { throw "zvk version failed ($LASTEXITCODE)" }
          & zvk status
          if ($LASTEXITCODE -ne 0) { throw "zvk status failed ($LASTEXITCODE)" }

      # `zig version` only prints the embedded version string — it doesn't
      # resolve lib_dir. `zig env` does, and is what catches the v0.0.6 bug
      # where bin/zig.exe was a plain copy with no adjacent lib/ (Zig fails
      # with "unable to find zig installation directory"). Also try a real
      # compile so anything that uses stdlib gets exercised.
      - name: zig version + env + compile a hello world
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = Join-Path $env:USERPROFILE '.zoptia\zig\bin'
          $env:PATH = "$bin;$env:PATH"

          & zig version
          if ($LASTEXITCODE -ne 0) { throw "zig version failed ($LASTEXITCODE)" }

          & zig env
          if ($LASTEXITCODE -ne 0) { throw "zig env failed ($LASTEXITCODE) — installation directory likely unresolved" }

          $tmp = Join-Path $env:RUNNER_TEMP "zig-smoke"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          $src = Join-Path $tmp "hello.zig"
          'const std = @import("std"); pub fn main() void { std.debug.print("ok\n", .{}); }' | Out-File -Encoding utf8 $src
          Push-Location $tmp
          try {
            & zig build-exe $src
            if ($LASTEXITCODE -ne 0) { throw "zig build-exe failed ($LASTEXITCODE)" }
            & .\hello.exe
            if ($LASTEXITCODE -ne 0) { throw "hello.exe failed ($LASTEXITCODE)" }
          } finally { Pop-Location }

      - name: Confirm expected files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:USERPROFILE '.zoptia\zig'
          $expected = @(
            (Join-Path $root 'bin\zvk.exe'),
            (Join-Path $root 'CLAUDE.md'),
            (Join-Path $root 'release\REFERENCE.md'),
            (Join-Path $root 'claude-plugin\.claude-plugin\marketplace.json')
          )
          foreach ($p in $expected) {
            if (-not (Test-Path $p)) { throw "missing: $p" }
            Write-Host "ok: $p"
          }

      # Asserts the Windows install used the .cmd shim layout (state file +
      # cmd wrapper). Catches regressions:
      #   - back to symlink/junction (would be a reparse point — breaks for
      #     non-admin users without Developer Mode)
      #   - back to a raw .exe copy in bin/ (would re-introduce the
      #     "unable to find zig installation directory" runtime bug)
      - name: Confirm Windows uses cmd-shim layout
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:USERPROFILE '.zoptia\zig'

          $reparseFlag = [System.IO.FileAttributes]::ReparsePoint
          foreach ($bin in @('bin\zig.cmd', 'bin\zls.cmd')) {
            $p = Join-Path $root $bin
            if (-not (Test-Path $p)) { throw "missing: $p" }
            $item = Get-Item $p
            if (($item.Attributes -band $reparseFlag) -ne 0) {
              throw "$bin is a reparse point (symlink/junction); expected a plain .cmd file"
            }
            # The wrapper should reference the real .exe under versions/ or zls/.
            $content = Get-Content $p -Raw
            if ($content -notmatch '\.exe') {
              throw "$bin doesn't look like a .cmd wrapper: $content"
            }
            Write-Host "ok: $bin is a .cmd wrapper"
          }

          # Make sure the legacy v0.0.5/0.0.6 file copies are gone.
          foreach ($legacy in @('bin\zig.exe', 'bin\zls.exe')) {
            $p = Join-Path $root $legacy
            if (Test-Path $p) { throw "stale: $p should be removed when upgrading to cmd-shim layout" }
          }
          Write-Host "ok: no legacy bin\*.exe leftovers"

          $stateFile = Join-Path $root 'channels\release.txt'
          if (-not (Test-Path $stateFile)) { throw "missing state file: $stateFile" }
          $version = (Get-Content $stateFile -Raw).Trim()
          Write-Host "ok: channels/release.txt = $version"

          $oldDir = Join-Path $root 'channels\release'
          if (Test-Path $oldDir) {
            $item = Get-Item $oldDir
            throw "unexpected: channels\release exists (Attributes=$($item.Attributes)); Windows should use channels\release.txt only"
          }
          Write-Host "ok: no channels\release directory (state file only)"
